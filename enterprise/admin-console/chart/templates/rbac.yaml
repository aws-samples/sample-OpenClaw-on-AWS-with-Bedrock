{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    app.kubernetes.io/name: admin-console
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  # OpenClawInstance CRD lifecycle
  - apiGroups: ["openclaw.rocks"]
    resources: ["openclawinstances", "openclawselfconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pod status, logs, exec (gateway approve-pairing), and secrets (IM bot tokens)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "services", "serviceaccounts", "namespaces"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Operator deployment status
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
  # CRD existence check
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    app.kubernetes.io/name: admin-console
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.serviceAccount.name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
{{- end }}
