<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Enterprise — UI Guide</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--card:#222536;--border:#2d3148;--primary:#6366f1;--primary-light:#818cf8;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--cyan:#06b6d4;--text:#e2e8f0;--text-sec:#94a3b8;--text-muted:#64748b;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1100px;margin:0 auto;padding:20px}

/* Header */
.header{text-align:center;padding:40px 20px 30px;border-bottom:1px solid var(--border)}
.header h1{font-size:28px;margin-bottom:8px}
.header p{color:var(--text-sec);font-size:14px}
.lang-toggle{display:flex;gap:4px;justify-content:center;margin-top:16px}
.lang-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;transition:all .2s}
.lang-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Role tabs */
.role-tabs{display:flex;gap:4px;justify-content:center;margin:24px 0;background:var(--surface);border-radius:10px;padding:4px;width:fit-content;margin-left:auto;margin-right:auto}
.role-tab{padding:8px 24px;border-radius:8px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}
.role-tab.active{background:var(--primary);color:#fff}

/* Progress */
.progress-bar{display:flex;gap:2px;margin:20px 0 30px;overflow-x:auto;padding:4px 0}
.progress-step{flex:1;min-width:80px;text-align:center;padding:8px 4px;border-radius:8px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.progress-step:hover{background:var(--surface)}
.progress-step.active{background:var(--primary);border-color:var(--primary)}
.progress-step.done{border-color:var(--success)}
.step-num{display:block;font-size:11px;color:var(--text-muted);margin-bottom:2px}
.progress-step.active .step-num{color:rgba(255,255,255,.7)}
.step-label{font-size:11px;font-weight:500}
.progress-step.active .step-label{color:#fff}
.progress-step.done .step-num{color:var(--success)}

/* Step content */
.step-content{display:none}
.step-content.active{display:block}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:24px}
.step-title{font-size:20px;font-weight:600;margin-bottom:6px}
.step-desc{color:var(--text-sec);font-size:14px;margin-bottom:20px}

/* Mockup */
.mockup{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:16px 0}
.mockup-header{background:var(--surface);padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600}
.mockup-body{padding:16px}
.mockup-sidebar{display:flex;gap:0}
.mock-sidebar{width:180px;background:var(--bg);padding:12px;border-right:1px solid var(--border);min-height:300px}
.mock-sidebar-item{padding:7px 10px;border-radius:6px;font-size:12px;color:var(--text-muted);margin-bottom:2px;cursor:default}
.mock-sidebar-item.active{background:var(--primary);color:#fff}
.mock-sidebar-item.sub{padding-left:24px;font-size:11px}
.mock-main{flex:1;padding:16px;min-height:300px}

/* UI Elements */
.mock-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;width:100%;display:block;margin-bottom:8px}
.mock-btn{display:inline-block;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:500;cursor:default}
.mock-btn.primary{background:var(--primary);color:#fff}
.mock-btn.success{background:var(--success);color:#fff}
.mock-btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text-sec)}
.mock-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.mock-badge.green{background:rgba(16,185,129,.15);color:var(--success)}
.mock-badge.yellow{background:rgba(245,158,11,.15);color:var(--warning)}
.mock-badge.blue{background:rgba(99,102,241,.15);color:var(--primary-light)}
.mock-badge.cyan{background:rgba(6,182,212,.15);color:var(--cyan)}

.mock-table{width:100%;border-collapse:collapse;font-size:12px}
.mock-table th{text-align:left;padding:6px 10px;color:var(--text-muted);font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:500}
.mock-table td{padding:8px 10px;border-bottom:1px solid rgba(45,49,72,.5)}

.mock-stat{text-align:center;padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.mock-stat .val{font-size:22px;font-weight:700}
.mock-stat .lbl{font-size:10px;color:var(--text-muted);margin-top:2px}

.mock-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}

/* Annotation */
.annotation{display:flex;align-items:flex-start;gap:10px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:8px;padding:12px 16px;margin:12px 0;font-size:13px}
.annotation.success{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2)}
.annotation.warning{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2)}
.ann-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.ann-text{flex:1}
.ann-text strong{color:var(--text)}

/* Tabs inside mockup */
.mock-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:12px}
.mock-tab{padding:6px 14px;font-size:12px;color:var(--text-muted);border-bottom:2px solid transparent;cursor:default}
.mock-tab.active{color:var(--primary-light);border-bottom-color:var(--primary)}

/* Nav buttons */
.nav-btns{display:flex;justify-content:space-between;margin-top:30px;padding-top:20px;border-top:1px solid var(--border)}
.nav-btn{padding:10px 24px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;transition:all .2s}
.nav-btn:hover{border-color:var(--primary);color:var(--primary-light)}
.nav-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.nav-btn.primary:hover{background:var(--primary-light)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}

/* Chain */
.chain{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:10px 0}
.chain-node{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--bg)}
.chain-arrow{color:var(--text-muted);font-size:12px}
.chain-node.primary{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:var(--primary-light)}
.chain-node.success{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--success)}
.chain-node.cyan{background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.3);color:var(--cyan)}

/* Hotspot */
.hotspot{position:relative;display:inline-block}
.hotspot::after{content:"";position:absolute;inset:-3px;border:2px solid var(--warning);border-radius:8px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.code-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'SF Mono',Monaco,monospace;font-size:12px;color:var(--text-sec);white-space:pre-wrap;margin:8px 0;overflow-x:auto}
</style>
</head>
<body>

<div class="header">
  <h1 id="h-title">OpenClaw Enterprise — UI Guide</h1>
  <p id="h-desc">Step-by-step walkthrough for IT Administrators and Employees</p>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">English</button>
    <button class="lang-btn" onclick="setLang('zh')">中文</button>
  </div>
</div>

<div class="container">
  <div class="role-tabs">
    <button class="role-tab active" onclick="setRole('admin')" id="tab-admin">IT Admin</button>
    <button class="role-tab" onclick="setRole('employee')" id="tab-employee">Employee</button>

  <div class="progress-bar" id="progress-bar"></div>

  <div id="steps-container"></div>

  <div class="nav-btns">
    <button class="nav-btn" id="btn-prev" onclick="prevStep()">← <span data-en="Previous" data-zh="上一步">Previous</span></button>
    <button class="nav-btn primary" id="btn-next" onclick="nextStep()"><span data-en="Next" data-zh="下一步">Next</span> →</button>
  </div>
</div>

let currentRole = 'admin';
let currentStep = 0;
let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(lang === 'en' ? 'English' : '中文')));
  document.getElementById('h-title').textContent = lang === 'en' ? 'OpenClaw Enterprise — UI Guide' : 'OpenClaw Enterprise — 使用指南';
  document.getElementById('h-desc').textContent = lang === 'en' ? 'Step-by-step walkthrough for IT Administrators and Employees' : 'IT 管理员和员工的分步操作指南';
  document.getElementById('tab-admin').textContent = lang === 'en' ? 'IT Admin' : 'IT 管理员';
  document.getElementById('tab-employee').textContent = lang === 'en' ? 'Employee' : '员工';
  renderSteps();
  applyLang();
}

function applyLang() {
  document.querySelectorAll('[data-en]').forEach(el => {
    el.textContent = currentLang === 'en' ? el.getAttribute('data-en') : el.getAttribute('data-zh');
  });
}

function setRole(role) {
  currentRole = role;
  currentStep = 0;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${role}`).classList.add('active');
  renderSteps();
}

function renderSteps() {
  const steps = STEPS[currentRole];
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = steps.map((s, i) => `
    <div class="progress-step ${i === currentStep ? 'active' : ''} ${i < currentStep ? 'done' : ''}" onclick="goStep(${i})">
      <span class="step-num">${i < currentStep ? '✓' : i + 1}</span>
      <span class="step-label">${s[currentLang].title.split(' ').slice(0,2).join(' ')}</span>
    </div>
  `).join('');

  const container = document.getElementById('steps-container');
  container.innerHTML = steps.map((s, i) => `
    <div class="step-content ${i === currentStep ? 'active' : ''}" id="step-${i}">
      <div class="step-card">
        <div class="step-title">${s[currentLang].title}</div>
        <div class="step-desc">${s[currentLang].desc}</div>
        ${s.html()}
      </div>
    </div>
  `).join('');

  updateNav();
  applyLang();
}

function goStep(i) { currentStep = i; renderSteps(); window.scrollTo({top: 200, behavior: 'smooth'}); }
function prevStep() { if (currentStep > 0) goStep(currentStep - 1); }
function nextStep() { if (currentStep < STEPS[currentRole].length - 1) goStep(currentStep + 1); }

function updateNav() {
  const steps = STEPS[currentRole];
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep === steps.length - 1;
}

renderSteps();
</script>
